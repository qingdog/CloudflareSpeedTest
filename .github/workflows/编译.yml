name: Build CloudflareSpeedTest Proxy

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows - 主要架构
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - os: windows-latest
            goos: windows
            goarch: 386
            ext: .exe
            archive: zip
            
          # Linux - 主要架构
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: 386
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
            
          # macOS
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            archive: zip
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build (Windows)
      if: matrix.goos == 'windows'
      shell: pwsh
      run: |
        $env:GOOS="${{ matrix.goos }}"
        $env:GOARCH="${{ matrix.goarch }}"
        go build -ldflags "-s -w" -o CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }} .
        echo "Built CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"

    - name: Build (Linux/macOS)
      if: matrix.goos != 'windows'
      run: |
        GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w" -o CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }} .
        echo "Built CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"

    - name: Create archive (Windows)
      if: matrix.goos == 'windows'
      shell: pwsh
      run: |
        Compress-Archive -Path CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }} -DestinationPath CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}.zip -Force

    - name: Create archive (Linux/macOS)
      if: matrix.goos != 'windows'
      run: |
        tar -czf CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}
        path: CloudflareST_proxy_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/*/CloudflareST_proxy_windows_amd64.zip
          artifacts/*/CloudflareST_proxy_windows_386.zip
          artifacts/*/CloudflareST_proxy_linux_amd64.tar.gz
          artifacts/*/CloudflareST_proxy_linux_386.tar.gz
          artifacts/*/CloudflareST_proxy_linux_arm64.tar.gz
          artifacts/*/CloudflareST_proxy_darwin_amd64.zip
          artifacts/*/CloudflareST_proxy_darwin_arm64.zip
        body: |
          ## CloudflareSpeedTest Proxy Version
          
          ### 新增功能
          - ✅ 支持 `IP:端口` 格式的反代测速
          - ✅ 自动端口映射和保留
          - ✅ 向后兼容传统IP段格式
          
          ### 支持的平台
          - Windows (amd64, 386)
          - Linux (amd64, 386, arm64)
          - macOS (amd64, arm64)
          
          ### 使用方法
          ```bash
          # 创建IP:端口格式的测试文件
          echo "1.1.1.1:443" > test.txt
          echo "8.8.8.8:80" >> test.txt
          
          # 运行测速
          ./CloudflareST_proxy_linux_amd64 -f test.txt -dn 10 -sl 1 -tl 1000
          ```
        draft: false
        prerelease: false
